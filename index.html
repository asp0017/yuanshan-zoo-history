<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>縱觀圓山動物園歷史</title>
  <link rel="stylesheet" href="./style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  
</head>
<body>
  <main class="site">

    <!-- 首頁 -->
    <section class="hero" id="home">
      <div class="hero-overlay"></div>

      <div class="hero-content">
        <p class="hero-years">1914－1986</p>
        <h1>消失的圓山動物園</h1>
        <p class="hero-text">
          臺北曾經有一座動物園。它存在了七十多年，
          見證了殖民、戰爭、重建、娛樂文化與現代保育觀念的轉變。
        </p>

        <button id="startBtn" class="start-btn">
          開始探索
        </button>
      </div>
    </section>

    <!-- 主要內容 -->
    <section class="timeline-section" id="timeline">

      <!-- 左側年代軸 -->
      <aside class="timeline-nav">
        <p class="timeline-label">Timeline</p>

        <button class="era-btn active" data-era="era1914">
          <span class="era-year">1914</span>
          <span class="era-name">創立</span>
        </button>

        <button class="era-btn" data-era="era1921">
          <span class="era-year">1921</span>
          <span class="era-name">全盛</span>
        </button>

        <button class="era-btn" data-era="era1937">
          <span class="era-year">1937</span>
          <span class="era-name">戰爭</span>
        </button>

        <button class="era-btn" data-era="era1946">
          <span class="era-year">1946</span>
          <span class="era-name">重生</span>
        </button>

        <button class="era-btn" data-era="era1970">
          <span class="era-year">1970</span>
          <span class="era-name">轉型</span>
        </button>

        <button class="era-btn" data-era="era1986">
          <span class="era-year">1986</span>
          <span class="era-name">告別</span>
        </button>
      </aside>

      <!-- 右側展示內容 -->
      <section class="content-area">

        <div class="image-panel">
          <div id="imageMap"></div>
        </div>

        <div class="story-panel">
          <p id="eraPeriod" class="era-period">1914－1920</p>

          <h2 id="eraTitle">
            創立與官營化時期
          </h2>

          <p id="eraSummary" class="era-summary">
            圓山動物園最初由日本民間人士大江氏創立，後由臺北廳收購並轉為官營，
            成為臺北現代動物園歷史的起點。
          </p>

          <div id="eraCards" class="cards">
            <article class="card">
              <h3>私人動物園的開始</h3>
              <p>1914 年，大江氏於圓山公園開設私營動物園。</p>
            </article>

            <article class="card">
              <h3>轉為官營</h3>
              <p>1915 年臺北廳收購，1916 年正式以公設動物園名義開放。</p>
            </article>
          </div>
        </div>

      </section>
    </section>

  </main>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="./data.js"></script>
  <script src="./main.js"></script>
</body>
</html>
